# Auto-label PRs based on changed paths

python:
  - changed-files:
      - any-glob-to-any-file: ['*.py']

web:
  - changed-files:
      - any-glob-to-any-file: ['templates/**', 'static/**']

api:
  - changed-files:
      - any-glob-to-any-file: ['web_app.py', 'page_routes.py', 'api.py']

database:
  - changed-files:
      - any-glob-to-any-file: ['data/**', 'storage.py']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

documentation:
  - changed-files:
      - any-glob-to-any-file: ['*.md', 'docs/**']
