name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=12 --max-line-length=120 --statistics --exit-zero

      - name: Syntax check all Python files
        run: |
          errors=0
          while IFS= read -r -d '' f; do
            if python -m py_compile "$f" 2>/dev/null; then
              echo "  ✓ ${f#./}"
            else
              echo "  ✗ FAILED: ${f#./}"
              errors=$((errors + 1))
            fi
          done < <(find . -name '*.py' -not -path './.git/*' -not -path './__pycache__/*' -not -path './venv/*' -print0)
          echo "=== $errors file(s) failed ==="
          [ "$errors" -eq 0 ] || exit 1

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config /dev/null
            --no-progress
            --exclude 'https?://localhost'
            --exclude 'https?://127\.0\.0\.1'
            --exclude 'https?://.*shields\.io'
            --exclude 'https?://.*example\.com'
            --exclude 'https?://.*test\.org'
            --exclude 'https?://.*yourusername.*'
            --exclude 'https?://.*your-username.*'
            --exclude 'https?://.*\{.*\}.*'
            --exclude 'https?://.*static\.streamlit\.io'
            --exclude 'https?://.*via\.placeholder\.com'
            '**/*.md' '**/*.py' '**/*.html'
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r . -x venv,__pycache__,Recommendation\ Systems -l
