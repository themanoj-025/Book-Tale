<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline — BookTale</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#1a1a22;--surface-2:#22222e;--text:#f0eff8;--text-muted:#9997b0;--accent:#7c6af7;--accent-2:#e8507a;--border:rgba(255,255,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.offline-container{text-align:center;padding:2rem;max-width:420px;animation:fadeIn 600ms cubic-bezier(0.16,1,0.3,1) both}
.offline-icon{width:96px;height:96px;margin:0 auto 1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:white;box-shadow:0 12px 40px rgba(124,106,247,0.25)}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
p{color:var(--text-muted);font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
.retry-btn{background:var(--accent);color:white;border:none;border-radius:9999px;padding:.75rem 2rem;font-size:1rem;font-weight:600;cursor:pointer;transition:all 250ms cubic-bezier(0.16,1,0.3,1)}
.retry-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,106,247,0.35)}
.offline-footer{margin-top:2.5rem;font-size:.75rem;color:var(--text-muted)}
.offline-footer a{color:var(--accent);text-decoration:none}
.book-icon{display:inline-block;animation:bounce 2s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@media(prefers-reduced-motion:reduce){.offline-container{animation:none}.book-icon{animation:none}}
</style>
</head>
<body>
<div class="offline-container">
  <div class="offline-icon">📡</div>
  <h1><span class="book-icon">📖</span> You're offline</h1>
  <p>Don't worry — your saved books, diary entries, and reading stats are cached locally. You can still browse everything you've already loaded.</p>
  <button class="retry-btn" onclick="window.location.reload()">🔄 Try Again</button>
  <div class="offline-footer">
    <a href="/feed">Back to Feed</a> &middot;
    <a href="/books">Browse Books</a> &middot;
    <a href="/diary">Reading Diary</a>
  </div>
</div>
</body>
</html>
